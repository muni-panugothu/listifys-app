<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline-variant": "#bbcac3",
                        "inverse-primary": "#55dcb6",
                        "surface-dim": "#d5dcd7",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#dde4df",
                        "on-primary": "#ffffff",
                        "primary-fixed": "#75f9d2",
                        "on-background": "#161d1a",
                        "secondary-fixed-dim": "#a6c8ff",
                        "error": "#ba1a1a",
                        "primary-container": "#27bb97",
                        "surface-container": "#e9efeb",
                        "surface-tint": "#006b55",
                        "secondary": "#005fb0",
                        "on-tertiary-container": "#4b3a00",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2b322f",
                        "on-tertiary-fixed": "#241a00",
                        "surface-container-highest": "#dde4df",
                        "on-surface-variant": "#3c4a44",
                        "surface-container-high": "#e3eae5",
                        "surface": "#f4fbf6",
                        "inverse-on-surface": "#ecf2ed",
                        "primary": "#006b55",
                        "on-primary-container": "#004535",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffe08e",
                        "surface-container-low": "#eff5f0",
                        "tertiary-container": "#cba100",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#00513f",
                        "secondary-fixed": "#d5e3ff",
                        "tertiary": "#755b00",
                        "background": "#f4fbf6",
                        "surface-bright": "#f4fbf6",
                        "error-container": "#ffdad6",
                        "on-surface": "#161d1a",
                        "on-secondary-fixed-variant": "#004786",
                        "secondary-container": "#5ba2ff",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-fixed-dim": "#f0c122",
                        "primary-fixed-dim": "#55dcb6",
                        "on-secondary-container": "#00376b",
                        "outline": "#6c7a74",
                        "on-secondary-fixed": "#001c3b",
                        "on-primary-fixed": "#002118",
                        "on-tertiary-fixed-variant": "#584400"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "grid_gutter": "12px",
                        "container_margin": "16px",
                        "stack_gap_sm": "8px",
                        "stack_gap_md": "16px",
                        "stack_gap_xs": "4px",
                        "stack_gap_lg": "24px"
                    },
                    "fontFamily": {
                        "h3": ["Inter"],
                        "price-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "price-md": ["Inter"],
                        "h1": ["Inter"],
                        "body-md": ["Inter"],
                        "h2": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                        "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center">
<!-- Header Section -->
<header class="w-full flex justify-between items-center px-4 h-16 bg-white/80 backdrop-blur-md fixed top-0 z-50 border-b border-slate-100">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-slate-50 transition-colors active:opacity-70">
<span class="material-symbols-outlined text-slate-900" data-icon="arrow_back">arrow_back</span>
</button>
<div class="absolute left-1/2 -translate-x-1/2">
<span class="text-xl font-black text-[#27BB97] tracking-tight">Listify</span>
</div>
<div class="w-10"></div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-md mt-16 px-container_margin flex flex-col flex-1 pt-stack_gap_lg pb-stack_gap_lg">
<!-- Hero Illustration / Visual Context -->
<div class="mb-stack_gap_lg flex justify-center">
<div class="w-full aspect-[16/9] rounded-xl overflow-hidden relative shadow-sm border border-slate-100 bg-surface-container-low">
<img alt="Security Concept" class="w-full h-full object-cover opacity-80" data-alt="abstract 3D rendering of a stylized glowing lock icon with teal gradients and soft glassmorphism light effects on a clean background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAs6vmYgbN2P-lkk-gR2Trq1sF0vK4FK5QElgQzJ6mQT3s3hRawaHjD6GhaNQ3ymMqgx7DaZF5p1eavgk2ZhaVVzN6aGRny4NErvZN8OzwSTzGkZgZn80SSOALIv45V0EyJWK3rbv5WZRN9fA-reho5-Bjkc_T9DriMYO5P1g21m4sXR0N6Rv5qIDZtBd-fGetw1Og-Zk8jMjy8KtXwOLxz7oOQRV_DxNJAQhJc1_KJqCss6itJ0mrDUzIAqa8hf8fnIRKlTLSBLvQ"/>
<div class="absolute inset-0 bg-gradient-to-t from-white/40 to-transparent"></div>
</div>
</div>
<!-- Typography Block -->
<section class="space-y-stack_gap_xs mb-stack_gap_lg">
<h1 class="font-h1 text-h1 text-on-background">Set New Password</h1>
<p class="font-body-md text-body-md text-outline">Create a strong password for your account</p>
</section>
<!-- Form Section -->
<form class="space-y-stack_gap_md flex-1">
<!-- New Password Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface">New Password</label>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg border-[#F3F4F6] bg-white text-on-surface focus:ring-2 focus:ring-[#27BB97]/20 focus:border-[#27BB97] outline-none transition-all placeholder:text-slate-300" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm New Password Input -->
<div class="space-y-2">
<label class="font-label-sm text-label-sm text-on-surface">Confirm New Password</label>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg border-[#F3F4F6] bg-white text-on-surface focus:ring-2 focus:ring-[#27BB97]/20 focus:border-[#27BB97] outline-none transition-all placeholder:text-slate-300" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Password Checklist (Bento Style Card) -->
<div class="bg-surface-container-lowest border border-slate-100 rounded-xl p-4 mt-stack_gap_md shadow-sm">
<p class="font-label-sm text-label-sm text-outline-variant mb-3">Security Requirements</p>
<ul class="space-y-3">
<li class="flex items-center gap-3">
<span class="w-5 h-5 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-primary" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</span>
<span class="font-body-md text-body-md text-on-surface">At least 8 characters</span>
</li>
<li class="flex items-center gap-3">
<span class="w-5 h-5 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-outline" data-icon="circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">circle</span>
</span>
<span class="font-body-md text-body-md text-outline">At least 1 number</span>
</li>
<li class="flex items-center gap-3">
<span class="w-5 h-5 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-[14px] text-outline" data-icon="circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">circle</span>
</span>
<span class="font-body-md text-body-md text-outline">At least 1 special character (@, #, $)</span>
</li>
</ul>
</div>
</form>
<!-- Action Button Container -->
<div class="mt-stack_gap_lg pb-stack_gap_md">
<button class="w-full h-[48px] bg-gradient-to-r from-[#27BB97] to-[#1E9E7E] text-white font-h3 text-h3 rounded-lg shadow-lg shadow-primary/20 active:scale-95 transition-transform">
                Reset Password
            </button>
<p class="text-center mt-stack_gap_md font-label-sm text-label-sm text-outline">
                Need help? <a class="text-[#27BB97] font-semibold" href="#">Contact Support</a>
</p>
</div>
</main>
<!-- Glassmorphic Accent for Depth -->
<div class="fixed top-0 right-0 -z-10 w-[300px] h-[300px] bg-[#27BB97]/5 blur-[100px] rounded-full translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-[300px] h-[300px] bg-secondary-container/5 blur-[100px] rounded-full -translate-x-1/2 translate-y-1/2"></div>
</body></html>
