<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#bbcac3",
                    "inverse-primary": "#55dcb6",
                    "surface-dim": "#d5dcd7",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#dde4df",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#75f9d2",
                    "on-background": "#161d1a",
                    "secondary-fixed-dim": "#a6c8ff",
                    "error": "#ba1a1a",
                    "primary-container": "#27bb97",
                    "surface-container": "#e9efeb",
                    "surface-tint": "#006b55",
                    "secondary": "#005fb0",
                    "on-tertiary-container": "#4b3a00",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2b322f",
                    "on-tertiary-fixed": "#241a00",
                    "surface-container-highest": "#dde4df",
                    "on-surface-variant": "#3c4a44",
                    "surface-container-high": "#e3eae5",
                    "surface": "#f4fbf6",
                    "inverse-on-surface": "#ecf2ed",
                    "primary": "#006b55",
                    "on-primary-container": "#004535",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffe08e",
                    "surface-container-low": "#eff5f0",
                    "tertiary-container": "#cba100",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#00513f",
                    "secondary-fixed": "#d5e3ff",
                    "tertiary": "#755b00",
                    "background": "#f4fbf6",
                    "surface-bright": "#f4fbf6",
                    "error-container": "#ffdad6",
                    "on-surface": "#161d1a",
                    "on-secondary-fixed-variant": "#004786",
                    "secondary-container": "#5ba2ff",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#f0c122",
                    "primary-fixed-dim": "#55dcb6",
                    "on-secondary-container": "#00376b",
                    "outline": "#6c7a74",
                    "on-secondary-fixed": "#001c3b",
                    "on-primary-fixed": "#002118",
                    "on-tertiary-fixed-variant": "#584400"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid_gutter": "12px",
                    "container_margin": "16px",
                    "stack_gap_sm": "8px",
                    "stack_gap_md": "16px",
                    "stack_gap_xs": "4px",
                    "stack_gap_lg": "24px"
            },
            "fontFamily": {
                    "h3": ["Inter"],
                    "price-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "price-md": ["Inter"],
                    "h1": ["Inter"],
                    "body-md": ["Inter"],
                    "h2": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Top Navigation (Onboarding Shell) -->
<header class="fixed top-0 left-0 w-full h-16 flex items-center justify-end px-container_margin z-50">
<button class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors px-4 py-2">
            Skip
        </button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto flex flex-col items-center justify-center px-container_margin pt-16 pb-24">
<!-- Illustration Container with Glassmorphism Accents -->
<div class="relative w-full aspect-square mb-stack_gap_lg flex items-center justify-center">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-3xl"></div>
<div class="relative w-full h-full bg-white/40 dark:bg-slate-900/40 backdrop-blur-sm rounded-[32px] overflow-hidden border border-white/50 dark:border-slate-800/50 shadow-sm flex items-center justify-center">
<img alt="Buy &amp; Sell Nearby" class="w-full h-full object-cover" data-alt="Modern high-quality illustration of friendly people trading a vintage camera and books in a vibrant urban neighborhood setting with soft daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBHXanUMnLRlnM_YGGybGj8tK-hYu_MKdcue0lwYs3snn1T83Sc0fjLU5cnx8SbwD1F8pn7fukUb0vt6HOpdGMVqMZgcEJXR86VSdyGMMbieSOYsqEDhT27iVr2OdEWfirbTN2qBHjBs8_VIYRUQWrQTr8Pn6H6F-g7LfOLcj9jaxH1pNgJtYQ2n9KHZcTbSt14arA8W0Ao68SuBX3UITzoj2MHZkTog7SB9XpIuG9DvKVWQhCmLMk-4dwdg2uRhVzP1Y3bmecSrao"/>
<!-- Floating Glassmorphic Badge -->
<div class="absolute bottom-6 right-6 flex items-center gap-2 bg-white/70 backdrop-blur-md px-4 py-2 rounded-full shadow-lg border border-white/80">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="location_on">location_on</span>
<span class="font-label-sm text-label-sm text-on-surface">Local deals</span>
</div>
</div>
</div>
<!-- Text Content -->
<div class="text-center space-y-stack_gap_md px-4">
<h1 class="font-h1 text-h1 text-on-background tracking-tight">
                Buy &amp; Sell Nearby
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant leading-relaxed">
                Discover great deals on everything from electronics to furniture in your neighborhood.
            </p>
</div>
</main>
<!-- Footer Controls -->
<footer class="fixed bottom-0 left-0 w-full max-w-md left-1/2 -translate-x-1/2 p-container_margin bg-gradient-to-t from-background via-background to-transparent pt-12">
<div class="flex flex-col items-center gap-stack_gap_lg w-full">
<!-- Dot Indicators -->
<div class="flex items-center gap-2">
<div class="h-2 w-6 rounded-full bg-primary transition-all duration-300"></div>
<div class="h-2 w-2 rounded-full bg-outline-variant transition-all duration-300"></div>
<div class="h-2 w-2 rounded-full bg-outline-variant transition-all duration-300"></div>
</div>
<!-- Action Button -->
<button class="w-full h-[52px] bg-gradient-to-r from-[#27BB97] to-[#1E9E7E] text-white rounded-xl font-h3 text-h3 shadow-lg shadow-primary/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2 group">
                Next
                <span class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</footer>
<!-- Decorative background elements -->
<div class="fixed -top-24 -left-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed top-1/2 -right-32 w-80 h-80 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
