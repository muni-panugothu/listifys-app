<div class="w-full h-full relative overflow-hidden rounded-[32px] shadow-lg border border-white/40 glass-card">

<span class="text-label-sm font-label-sm text-on-surface">Design</span>
</div>
<div class="bg-white/90 backdrop-blur-md px-3 py-1.5 rounded-full border border-slate-100 shadow-sm flex items-center gap-2 translate-x-4">
<span class="material-symbols-outlined text-[16px] text-secondary">code</span>
<span class="text-label-sm font-label-sm text-on-surface">Development</span>
</div>
</div>
<!-- Provider Profile Mini-Card -->

</div>
</div>
</div>

      </p>

</div>
