<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary-container": "#27bb97",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#55dcb6",
                    "surface-dim": "#d5dcd7",
                    "on-tertiary-fixed": "#241a00",
                    "tertiary-container": "#cba100",
                    "on-secondary-container": "#00376b",
                    "on-primary-fixed-variant": "#00513f",
                    "on-primary-container": "#004535",
                    "tertiary": "#755b00",
                    "secondary-fixed-dim": "#a6c8ff",
                    "on-primary-fixed": "#002118",
                    "surface-container": "#e9efeb",
                    "on-tertiary-container": "#4b3a00",
                    "inverse-on-surface": "#ecf2ed",
                    "surface-container-high": "#e3eae5",
                    "surface-variant": "#dde4df",
                    "surface-tint": "#006b55",
                    "on-background": "#161d1a",
                    "primary-fixed": "#75f9d2",
                    "error": "#ba1a1a",
                    "on-secondary-fixed": "#001c3b",
                    "background": "#f4fbf6",
                    "surface-container-highest": "#dde4df",
                    "secondary": "#005fb0",
                    "error-container": "#ffdad6",
                    "outline": "#6c7a74",
                    "on-surface": "#161d1a",
                    "surface-container-low": "#eff5f0",
                    "tertiary-fixed-dim": "#f0c122",
                    "secondary-fixed": "#d5e3ff",
                    "inverse-surface": "#2b322f",
                    "surface-bright": "#f4fbf6",
                    "on-secondary-fixed-variant": "#004786",
                    "inverse-primary": "#55dcb6",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "tertiary-fixed": "#ffe08e",
                    "on-surface-variant": "#3c4a44",
                    "on-secondary": "#ffffff",
                    "primary": "#006b55",
                    "surface-container-lowest": "#ffffff",
                    "outline-variant": "#bbcac3",
                    "on-tertiary-fixed-variant": "#584400",
                    "surface": "#f4fbf6",
                    "secondary-container": "#5ba2ff",
                    "on-tertiary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid_gutter": "12px",
                    "container_margin": "16px",
                    "stack_gap_sm": "8px",
                    "stack_gap_md": "16px",
                    "stack_gap_xs": "4px",
                    "stack_gap_lg": "24px"
            },
            "fontFamily": {
                    "h3": ["Inter"],
                    "h1": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "price-md": ["Inter"],
                    "price-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "h2": ["Inter"]
            },
            "fontSize": {
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                    "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                    "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .chat-bubble-left {
            position: relative;
            border-bottom-left-radius: 4px;
        }
        .chat-bubble-right {
            position: relative;
            border-bottom-right-radius: 4px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-container-lowest min-h-screen flex flex-col font-body-md text-on-surface">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-gray-950/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 shadow-sm flex items-center justify-between px-4 h-16">
<div class="flex items-center gap-3">
<button class="active:scale-95 duration-200 text-[#27BB97]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div class="flex items-center gap-3">
<div class="relative">
<img alt="Priya Sharma" class="w-10 h-10 rounded-full object-cover ring-2 ring-primary-container/20" data-alt="Close-up portrait of a friendly professional Indian woman with a warm smile and styled hair in a bright studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkbDj3WVZlplCzzdMgPqKGMWUR41rieSQRogJn6V5hIlmTfa5SJwCm2-VdoE0O4pPyF4RS0PTAtkjbHFM7w9hX4bTTLOKGehPKsw5exMOp7TmWuTSTdGH0uRySutMVmSPp_dvHQIYGfZDLuhvAig3sc6XR_B_h0zCW4PAzhyKZGVE7T31wVkrqnWYH7Y6dUkM08OPlCPb6tUtifXh8x7FygapuSFls775-clKIWj8mG8tT0m-tw32MODbEXwqO0EpOyMBjr8i31Wk"/>
<span class="absolute bottom-0 right-0 w-3 h-3 bg-[#27BB97] border-2 border-white rounded-full"></span>
</div>
<div>
<h1 class="font-['Inter'] text-sm font-semibold tracking-tight text-gray-900 leading-tight">Priya Sharma</h1>
<p class="text-[10px] text-[#27BB97] font-medium">Online</p>
</div>
</div>
</div>
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 text-gray-500">
<span class="material-symbols-outlined" data-icon="videocam">videocam</span>
</button>
<button class="active:scale-95 duration-200 text-gray-500">
<span class="material-symbols-outlined" data-icon="call">call</span>
</button>
<button class="active:scale-95 duration-200 text-gray-500">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</div>
</header>
<!-- Main Chat Canvas -->
<main class="flex-1 mt-16 mb-24 px-4 py-6 overflow-y-auto space-y-6">
<!-- Product Context Card -->
<div class="bg-surface-container-low rounded-xl p-3 flex items-center gap-3 border border-outline-variant/30">
<img alt="MacBook Pro" class="w-12 h-12 rounded-lg object-cover" data-alt="Sleek space gray modern laptop on a clean white desk with soft shadows and minimalist office vibes" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCksGlF_ziSLbrYueZLbgXejWzJj1EWxFYBbz09ok6lGfgWjNTGZEeKbUbho7b53LaaXM320UOaT1rxdD_dkXolST52N857_b1XO6lt_3kEqugcesj_51eGY6ToiJUQ6UOFGiyazQB6Hq1qid2LAFIPnge5jL3mCdmLCennl8HsuScg0CmmIYAXgM3_aCetSESsjO8Rh_2iId4PrT0kn4tkikRDxdsIUHvCmyG_6HyaCthhuPtxVuDZ-Zx7LDq-ezlG9V_5T0Kf3Y"/>
<div class="flex-1">
<p class="font-label-sm text-on-surface-variant">Inquired about</p>
<h3 class="font-h3 text-sm">MacBook Pro M2 - 14 inch</h3>
<p class="font-price-md text-[#27BB97] text-sm">₹1,24,000</p>
</div>
<span class="material-symbols-outlined text-gray-400" data-icon="chevron_right">chevron_right</span>
</div>
<!-- Date Divider -->
<div class="flex justify-center">
<span class="bg-surface-container-high px-3 py-1 rounded-full text-[10px] font-medium text-on-surface-variant uppercase tracking-wider">Today</span>
</div>
<!-- Left Message -->
<div class="flex flex-col items-start max-w-[85%] group">
<div class="chat-bubble-left bg-white border border-gray-100 shadow-sm p-4 rounded-2xl text-on-surface font-body-md leading-relaxed">
                Hi, is the MacBook still available?
            </div>
<span class="text-[10px] text-gray-400 mt-1 ml-1">1:58 PM</span>
</div>
<!-- Right Message -->
<div class="flex flex-col items-end max-w-[85%] ml-auto group">
<div class="chat-bubble-right bg-primary-container text-white p-4 rounded-2xl shadow-md font-body-md leading-relaxed">
                Yes, it is!
            </div>
<div class="flex items-center gap-1 mt-1 mr-1">
<span class="text-[10px] text-gray-400">2:01 PM</span>
<span class="material-symbols-outlined text-[12px] text-[#27BB97]" data-icon="done_all">done_all</span>
</div>
</div>
<!-- Left Message -->
<div class="flex flex-col items-start max-w-[85%] group">
<div class="chat-bubble-left bg-white border border-gray-100 shadow-sm p-4 rounded-2xl text-on-surface font-body-md leading-relaxed">
                Great! Is the price negotiable?
            </div>
<span class="text-[10px] text-gray-400 mt-1 ml-1">2:04 PM</span>
</div>
</main>
<!-- Chat Input Area -->
<footer class="fixed bottom-0 w-full bg-white border-t border-gray-100 px-4 py-3 pb-8 z-50">
<div class="flex items-end gap-3">
<div class="flex items-center gap-1 mb-2">
<button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-[#27BB97] active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
<button class="w-10 h-10 flex items-center justify-center text-gray-400 hover:text-[#27BB97] active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
</button>
</div>
<div class="flex-1 relative">
<textarea class="w-full bg-gray-50 border-none rounded-2xl px-4 py-3 pr-12 focus:ring-2 focus:ring-primary-container/20 text-body-md resize-none max-h-32" placeholder="Type a message..." rows="1"></textarea>
<button class="absolute right-2 bottom-1.5 w-9 h-9 bg-primary-container text-white rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-all">
<span class="material-symbols-outlined" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</footer>
<!-- BottomNavBar (Hidden on this transactional/focused screen as per UX guidelines) -->
<!-- The BottomNavBar is suppressed to prioritize the chat input and keyboard space -->
</body></html>
