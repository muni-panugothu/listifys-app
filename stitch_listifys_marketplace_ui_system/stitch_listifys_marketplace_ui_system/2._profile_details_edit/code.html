<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
    }
  </style>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "primary-container": "#27bb97",
                  "on-error-container": "#93000a",
                  "primary-fixed-dim": "#55dcb6",
                  "surface-dim": "#d5dcd7",
                  "on-tertiary-fixed": "#241a00",
                  "tertiary-container": "#cba100",
                  "on-secondary-container": "#00376b",
                  "on-primary-fixed-variant": "#00513f",
                  "on-primary-container": "#004535",
                  "tertiary": "#755b00",
                  "secondary-fixed-dim": "#a6c8ff",
                  "on-primary-fixed": "#002118",
                  "surface-container": "#e9efeb",
                  "on-tertiary-container": "#4b3a00",
                  "inverse-on-surface": "#ecf2ed",
                  "surface-container-high": "#e3eae5",
                  "surface-variant": "#dde4df",
                  "surface-tint": "#006b55",
                  "on-background": "#161d1a",
                  "primary-fixed": "#75f9d2",
                  "error": "#ba1a1a",
                  "on-secondary-fixed": "#001c3b",
                  "background": "#f4fbf6",
                  "surface-container-highest": "#dde4df",
                  "secondary": "#005fb0",
                  "error-container": "#ffdad6",
                  "outline": "#6c7a74",
                  "on-surface": "#161d1a",
                  "surface-container-low": "#eff5f0",
                  "tertiary-fixed-dim": "#f0c122",
                  "secondary-fixed": "#d5e3ff",
                  "inverse-surface": "#2b322f",
                  "surface-bright": "#f4fbf6",
                  "on-secondary-fixed-variant": "#004786",
                  "inverse-primary": "#55dcb6",
                  "on-primary": "#ffffff",
                  "on-error": "#ffffff",
                  "tertiary-fixed": "#ffe08e",
                  "on-surface-variant": "#3c4a44",
                  "on-secondary": "#ffffff",
                  "primary": "#006b55",
                  "surface-container-lowest": "#ffffff",
                  "outline-variant": "#bbcac3",
                  "on-tertiary-fixed-variant": "#584400",
                  "surface": "#f4fbf6",
                  "secondary-container": "#5ba2ff",
                  "on-tertiary": "#ffffff"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "grid_gutter": "12px",
                  "container_margin": "16px",
                  "stack_gap_sm": "8px",
                  "stack_gap_md": "16px",
                  "stack_gap_xs": "4px",
                  "stack_gap_lg": "24px"
          },
          "fontFamily": {
                  "h3": ["Inter"],
                  "h1": ["Inter"],
                  "body-md": ["Inter"],
                  "body-lg": ["Inter"],
                  "price-md": ["Inter"],
                  "price-lg": ["Inter"],
                  "label-sm": ["Inter"],
                  "h2": ["Inter"]
          },
          "fontSize": {
                  "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                  "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                  "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                  "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                  "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                  "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface-bright text-on-surface font-body-md antialiased min-h-screen">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-gray-950/80 backdrop-blur-md border-b border-gray-100 dark:border-gray-800 shadow-sm">
<div class="flex items-center justify-between px-4 h-16 w-full max-w-2xl mx-auto">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[#27BB97]">arrow_back</span>
</button>
<h1 class="font-['Inter'] text-sm font-semibold tracking-tight text-on-surface">Profile</h1>
</div>
<button class="active:scale-95 duration-200 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-gray-500">settings</span>
</button>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-2xl mx-auto">
<!-- Profile Header Section -->
<section class="flex flex-col items-center mb-10">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-white shadow-lg">
<img alt="Profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a friendly professional South Asian man with short dark hair in a bright modern studio setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVMV7uLhF5SdxXjdDg3uL4I-i5ornCKRk-r3WdGEymIwLJ6N3flIlFOehIZ1kFsjdRZ80ZC75OGDnQ0IRgS2tI1mjjyVk8WOat43RTWVp-FEiuke50fSCjvCRY_2EZVZ4piAOdwFnHNksKvUq2Va8gAcotnwvNp-MYQIb8l-qhAAXPa36B2cCqHQml8_nAfnynLVCUWxfWfeOKqx3WL4quU3G4FaBKpKkjVehZeKGxZx1tdo-QoiRsFz6iVrNW0pDY91TnVbh4cYk"/>
</div>
<button class="absolute bottom-1 right-1 bg-primary-container text-white p-2 rounded-full shadow-md active:scale-90 transition-transform">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<p class="mt-4 font-label-sm text-on-surface-variant">Tap to update photo</p>
</section>
<!-- Form Section -->
<form class="space-y-6">
<!-- Full Name -->
<div class="flex flex-col space-y-2">
<label class="font-label-sm text-on-surface font-medium px-1" for="full_name">Full Name</label>
<div class="relative">
<input class="w-full h-12 bg-white border border-gray-100 rounded-xl px-4 focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container outline-none transition-all font-body-md text-on-surface" id="full_name" type="text" value="Arjun Sharma"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col space-y-2">
<label class="font-label-sm text-on-surface font-medium px-1" for="email">Email</label>
<div class="relative">
<input class="w-full h-12 bg-white border border-gray-100 rounded-xl px-4 focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container outline-none transition-all font-body-md text-on-surface" id="email" type="email" value="arjun.s@gmail.com"/>
</div>
</div>
<!-- Phone -->
<div class="flex flex-col space-y-2">
<label class="font-label-sm text-on-surface font-medium px-1" for="phone">Phone</label>
<div class="relative">
<input class="w-full h-12 bg-white border border-gray-100 rounded-xl px-4 focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container outline-none transition-all font-body-md text-on-surface" id="phone" type="tel" value="+91 98765-XXXXX"/>
</div>
</div>
<!-- Location -->
<div class="flex flex-col space-y-2">
<label class="font-label-sm text-on-surface font-medium px-1" for="location">Location</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-lg">location_on</span>
<input class="w-full h-12 bg-white border border-gray-100 rounded-xl pl-11 pr-4 focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container outline-none transition-all font-body-md text-on-surface" id="location" type="text" value="Indiranagar, Bangalore"/>
</div>
</div>
<!-- Bio -->
<div class="flex flex-col space-y-2">
<label class="font-label-sm text-on-surface font-medium px-1" for="bio">Bio</label>
<div class="relative">
<textarea class="w-full bg-white border border-gray-100 rounded-xl px-4 py-3 focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container outline-none transition-all font-body-md text-on-surface resize-none" id="bio" rows="4">Minimalist enthusiast selling quality pre-owned tech and furniture</textarea>
</div>
<p class="text-right font-label-sm text-gray-400">62/150 characters</p>
</div>
</form>
</main>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-lg border-t border-gray-100 p-4 z-50">
<div class="max-w-2xl mx-auto">
<button class="w-full h-14 bg-gradient-to-r from-[#27BB97] to-[#1E9E7E] text-white font-h3 rounded-xl shadow-lg shadow-[#27BB97]/20 active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
        Save Changes
      </button>
</div>
</div>
<!-- Bottom Nav Suppressed (Sub-page rule) -->
</body></html>
