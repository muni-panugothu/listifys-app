<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
                  "outline-variant": "#bbcac3",
                  "inverse-primary": "#55dcb6",
                  "surface-dim": "#d5dcd7",
                  "on-tertiary": "#ffffff",
                  "surface-variant": "#dde4df",
                  "on-primary": "#ffffff",
                  "primary-fixed": "#75f9d2",
                  "on-background": "#161d1a",
                  "secondary-fixed-dim": "#a6c8ff",
                  "error": "#ba1a1a",
                  "primary-container": "#27bb97",
                  "surface-container": "#e9efeb",
                  "surface-tint": "#006b55",
                  "secondary": "#005fb0",
                  "on-tertiary-container": "#4b3a00",
                  "on-error": "#ffffff",
                  "inverse-surface": "#2b322f",
                  "on-tertiary-fixed": "#241a00",
                  "surface-container-highest": "#dde4df",
                  "on-surface-variant": "#3c4a44",
                  "surface-container-high": "#e3eae5",
                  "surface": "#f4fbf6",
                  "inverse-on-surface": "#ecf2ed",
                  "primary": "#006b55",
                  "on-primary-container": "#004535",
                  "on-secondary": "#ffffff",
                  "tertiary-fixed": "#ffe08e",
                  "surface-container-low": "#eff5f0",
                  "tertiary-container": "#cba100",
                  "on-error-container": "#93000a",
                  "on-primary-fixed-variant": "#00513f",
                  "secondary-fixed": "#d5e3ff",
                  "tertiary": "#755b00",
                  "background": "#f4fbf6",
                  "surface-bright": "#f4fbf6",
                  "error-container": "#ffdad6",
                  "on-surface": "#161d1a",
                  "on-secondary-fixed-variant": "#004786",
                  "secondary-container": "#5ba2ff",
                  "surface-container-lowest": "#ffffff",
                  "tertiary-fixed-dim": "#f0c122",
                  "primary-fixed-dim": "#55dcb6",
                  "on-secondary-container": "#00376b",
                  "outline": "#6c7a74",
                  "on-secondary-fixed": "#001c3b",
                  "on-primary-fixed": "#002118",
                  "on-tertiary-fixed-variant": "#584400"
          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "grid_gutter": "12px",
                  "container_margin": "16px",
                  "stack_gap_sm": "8px",
                  "stack_gap_md": "16px",
                  "stack_gap_xs": "4px",
                  "stack_gap_lg": "24px"
          },
          "fontFamily": {
                  "h3": ["Inter"],
                  "price-lg": ["Inter"],
                  "body-lg": ["Inter"],
                  "price-md": ["Inter"],
                  "h1": ["Inter"],
                  "body-md": ["Inter"],
                  "h2": ["Inter"],
                  "label-sm": ["Inter"]
          },
          "fontSize": {
                  "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                  "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                  "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                  "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                  "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                  "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                  "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                  "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}]
          }
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
      line-height: 1;
      text-transform: none;
      letter-spacing: normal;
      word-wrap: normal;
      white-space: nowrap;
      direction: ltr;
    }
    .otp-input-focus:focus {
      border-color: #27bb97;
      box-shadow: 0 0 0 2px rgba(39, 187, 151, 0.2);
      outline: none;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col">
<!-- Navigation Shell Suppressed: Transactional Screen (Reset OTP) -->
<!-- Header -->
<header class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex justify-between items-center px-4 h-16 w-full sticky top-0 z-50">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-surface-container transition-colors active:opacity-70">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-black text-[#27BB97] tracking-tight">Listify</h1>
<div class="w-10"></div> <!-- Spacer for balance -->
</header>
<main class="flex-grow flex flex-col items-center justify-center px-container_margin py-stack_gap_lg max-w-md mx-auto w-full">
<!-- Hero Icon/Illustration Area -->
<div class="mb-stack_gap_lg relative">
<div class="w-24 h-24 bg-primary-container/10 rounded-full flex items-center justify-center relative z-10">
<span class="material-symbols-outlined text-primary text-[48px]" data-icon="lock_reset">lock_reset</span>
</div>
<div class="absolute -top-2 -right-2 w-12 h-12 bg-secondary-container/20 rounded-full blur-xl"></div>
<div class="absolute -bottom-4 -left-4 w-16 h-16 bg-primary-container/20 rounded-full blur-xl"></div>
</div>
<!-- Typography Block -->
<div class="text-center space-y-2 mb-stack_gap_lg">
<h2 class="font-h1 text-h1 text-on-surface">Password Reset Code</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
        A 6-digit code has been sent to your email
      </p>
</div>
<!-- OTP Input Section -->
<div class="w-full space-y-stack_gap_lg">
<div class="grid grid-cols-6 gap-2 sm:gap-3">
<input class="w-full aspect-square text-center font-h2 text-h2 bg-surface-container-lowest border border-outline-variant rounded-lg otp-input-focus transition-all duration-200" maxlength="1" placeholder="-" type="text"/>
<input class="w-full aspect-square text-center font-h2 text-h2 bg-surface-container-lowest border border-outline-variant rounded-lg otp-input-focus transition-all duration-200" maxlength="1" placeholder="-" type="text"/>
<input class="w-full aspect-square text-center font-h2 text-h2 bg-surface-container-lowest border border-outline-variant rounded-lg otp-input-focus transition-all duration-200" maxlength="1" placeholder="-" type="text"/>
<input class="w-full aspect-square text-center font-h2 text-h2 bg-surface-container-lowest border border-outline-variant rounded-lg otp-input-focus transition-all duration-200" maxlength="1" placeholder="-" type="text"/>
<input class="w-full aspect-square text-center font-h2 text-h2 bg-surface-container-lowest border border-outline-variant rounded-lg otp-input-focus transition-all duration-200" maxlength="1" placeholder="-" type="text"/>
<input class="w-full aspect-square text-center font-h2 text-h2 bg-surface-container-lowest border border-outline-variant rounded-lg otp-input-focus transition-all duration-200" maxlength="1" placeholder="-" type="text"/>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] bg-gradient-to-r from-[#27BB97] to-[#1E9E7E] text-white font-h3 text-h3 rounded-lg shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
        Verify &amp; Reset
      </button>
</div>
<!-- Footer Links -->
<div class="mt-stack_gap_lg text-center space-y-stack_gap_md">
<p class="font-body-md text-body-md text-on-surface-variant">
        Didn't receive the code? 
        <button class="text-primary font-semibold hover:underline transition-all">Resend</button>
</p>
<!-- Security Note -->
<div class="flex items-center justify-center gap-2 text-on-surface-variant opacity-60">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<span class="font-label-sm text-label-sm uppercase tracking-widest">Secure Verification</span>
</div>
</div>
</main>
<!-- Decorative Background Elements -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary-container/5 rounded-full blur-[100px]"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-secondary-container/5 rounded-full blur-[120px]"></div>
<!-- Bottom Sheet Simulation (Glassmorphism Accent) -->
<div class="mt-auto p-container_margin">
<div class="bg-white/40 backdrop-blur-md border border-white/20 rounded-xl p-4 flex items-start gap-4">
<div class="bg-primary/10 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary" data-icon="info">info</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface font-bold mb-1">Check your Spam</p>
<p class="font-body-md text-[13px] text-on-surface-variant leading-tight">If you don't see the email in your inbox, please check your junk or spam folder.</p>
</div>
</div>
</div>
</body></html>
