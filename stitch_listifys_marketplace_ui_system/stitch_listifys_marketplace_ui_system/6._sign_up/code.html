<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#bbcac3",
                    "inverse-primary": "#55dcb6",
                    "surface-dim": "#d5dcd7",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#dde4df",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#75f9d2",
                    "on-background": "#161d1a",
                    "secondary-fixed-dim": "#a6c8ff",
                    "error": "#ba1a1a",
                    "primary-container": "#27bb97",
                    "surface-container": "#e9efeb",
                    "surface-tint": "#006b55",
                    "secondary": "#005fb0",
                    "on-tertiary-container": "#4b3a00",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2b322f",
                    "on-tertiary-fixed": "#241a00",
                    "surface-container-highest": "#dde4df",
                    "on-surface-variant": "#3c4a44",
                    "surface-container-high": "#e3eae5",
                    "surface": "#f4fbf6",
                    "inverse-on-surface": "#ecf2ed",
                    "primary": "#006b55",
                    "on-primary-container": "#004535",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffe08e",
                    "surface-container-low": "#eff5f0",
                    "tertiary-container": "#cba100",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#00513f",
                    "secondary-fixed": "#d5e3ff",
                    "tertiary": "#755b00",
                    "background": "#f4fbf6",
                    "surface-bright": "#f4fbf6",
                    "error-container": "#ffdad6",
                    "on-surface": "#161d1a",
                    "on-secondary-fixed-variant": "#004786",
                    "secondary-container": "#5ba2ff",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#f0c122",
                    "primary-fixed-dim": "#55dcb6",
                    "on-secondary-container": "#00376b",
                    "outline": "#6c7a74",
                    "on-secondary-fixed": "#001c3b",
                    "on-primary-fixed": "#002118",
                    "on-tertiary-fixed-variant": "#584400"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid_gutter": "12px",
                    "container_margin": "16px",
                    "stack_gap_sm": "8px",
                    "stack_gap_md": "16px",
                    "stack_gap_xs": "4px",
                    "stack_gap_lg": "24px"
            },
            "fontFamily": {
                    "h3": ["Inter"],
                    "price-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "price-md": ["Inter"],
                    "h1": ["Inter"],
                    "body-md": ["Inter"],
                    "h2": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col">
<!-- TopAppBar Fragment (Supressed Nav Shell for Transactional flow) -->
<header class="flex justify-between items-center px-4 h-16 w-full fixed top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 z-50">
<button class="active:opacity-70 transition-opacity p-2 -ml-2">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-50">arrow_back</span>
</button>
<div class="text-xl font-black text-[#27BB97] tracking-tight">Listify</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="flex-grow pt-24 pb-12 px-container_margin max-w-lg mx-auto w-full">
<!-- Header Section -->
<section class="mb-stack_gap_lg">
<h1 class="font-h1 text-h1 text-on-surface mb-stack_gap_xs">Create Account</h1>
<p class="font-body-lg text-body-lg text-outline">Start your journey with Listify</p>
</section>
<!-- Form Section -->
<form class="space-y-stack_gap_md">
<!-- Full Name -->
<div class="space-y-stack_gap_xs">
<label class="font-label-sm text-label-sm text-on-surface block px-1">Full Name</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg bg-surface-container-lowest border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md" placeholder="John Doe" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-stack_gap_xs">
<label class="font-label-sm text-label-sm text-on-surface block px-1">Email</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg bg-surface-container-lowest border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md" placeholder="hello@example.com" type="email"/>
</div>
</div>
<!-- Phone Number -->
<div class="space-y-stack_gap_xs">
<label class="font-label-sm text-label-sm text-on-surface block px-1">Phone Number</label>
<div class="flex gap-2">
<div class="w-24 h-12 flex items-center justify-center rounded-lg bg-surface-container-low border border-outline-variant font-body-md text-on-surface-variant">
                        +91
                    </div>
<input class="flex-1 h-12 px-4 rounded-lg bg-surface-container-lowest border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md" placeholder="9876543210" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="space-y-stack_gap_xs">
<label class="font-label-sm text-label-sm text-on-surface block px-1">Password</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg bg-surface-container-lowest border border-outline-variant focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all outline-none font-body-md" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Strength Indicator -->
<div class="pt-2">
<div class="flex gap-1 h-1.5 w-full">
<div class="flex-1 rounded-full bg-primary-container"></div>
<div class="flex-1 rounded-full bg-primary-container"></div>
<div class="flex-1 rounded-full bg-surface-container-highest"></div>
<div class="flex-1 rounded-full bg-surface-container-highest"></div>
</div>
<p class="font-label-sm text-label-sm text-primary-container mt-1.5">Strong password</p>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 py-2">
<div class="relative flex items-center">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary-container bg-surface-container-lowest cursor-pointer" id="terms" type="checkbox"/>
</div>
<label class="font-body-md text-body-md text-on-surface-variant leading-tight cursor-pointer" for="terms">
                    I agree to <span class="text-primary font-medium">Terms &amp; Conditions</span> and <span class="text-primary font-medium">Privacy Policy</span>
</label>
</div>
<!-- Create Account Button -->
<button class="w-full h-12 mt-4 bg-gradient-to-r from-[#27BB97] to-[#1E9E7E] text-white rounded-lg font-h3 text-h3 shadow-lg shadow-[#27BB97]/20 active:scale-[0.98] transition-transform" type="submit">
                Create Account
            </button>
</form>
<!-- Footer Link -->
<div class="mt-stack_gap_lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-semibold ml-1 hover:underline" href="#">Sign In</a>
</p>
</div>
<!-- Extra Decorative Element (Bento-style accent) -->
<div class="mt-12 p-6 rounded-2xl bg-surface-container-low border border-slate-100 flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">verified_user</span>
</div>
<div>
<p class="font-label-sm text-label-sm text-on-surface font-bold">100% Trusted Community</p>
<p class="font-body-md text-[13px] text-outline">Verified profiles and secure transactions.</p>
</div>
</div>
</main>
<!-- Background Decorative Gradients -->
<div class="fixed top-0 left-0 -z-10 w-full h-full pointer-events-none overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary-container/5 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 -left-24 w-64 h-64 bg-secondary-container/5 rounded-full blur-3xl"></div>
</div>
</body></html>
