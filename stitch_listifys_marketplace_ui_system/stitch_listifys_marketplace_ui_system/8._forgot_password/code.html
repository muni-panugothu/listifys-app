<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#bbcac3",
                    "inverse-primary": "#55dcb6",
                    "surface-dim": "#d5dcd7",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#dde4df",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#75f9d2",
                    "on-background": "#161d1a",
                    "secondary-fixed-dim": "#a6c8ff",
                    "error": "#ba1a1a",
                    "primary-container": "#27bb97",
                    "surface-container": "#e9efeb",
                    "surface-tint": "#006b55",
                    "secondary": "#005fb0",
                    "on-tertiary-container": "#4b3a00",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2b322f",
                    "on-tertiary-fixed": "#241a00",
                    "surface-container-highest": "#dde4df",
                    "on-surface-variant": "#3c4a44",
                    "surface-container-high": "#e3eae5",
                    "surface": "#f4fbf6",
                    "inverse-on-surface": "#ecf2ed",
                    "primary": "#006b55",
                    "on-primary-container": "#004535",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffe08e",
                    "surface-container-low": "#eff5f0",
                    "tertiary-container": "#cba100",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#00513f",
                    "secondary-fixed": "#d5e3ff",
                    "tertiary": "#755b00",
                    "background": "#f4fbf6",
                    "surface-bright": "#f4fbf6",
                    "error-container": "#ffdad6",
                    "on-surface": "#161d1a",
                    "on-secondary-fixed-variant": "#004786",
                    "secondary-container": "#5ba2ff",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#f0c122",
                    "primary-fixed-dim": "#55dcb6",
                    "on-secondary-container": "#00376b",
                    "outline": "#6c7a74",
                    "on-secondary-fixed": "#001c3b",
                    "on-primary-fixed": "#002118",
                    "on-tertiary-fixed-variant": "#584400"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid_gutter": "12px",
                    "container_margin": "16px",
                    "stack_gap_sm": "8px",
                    "stack_gap_md": "16px",
                    "stack_gap_xs": "4px",
                    "stack_gap_lg": "24px"
            },
            "fontFamily": {
                    "h3": ["Inter"],
                    "price-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "price-md": ["Inter"],
                    "h1": ["Inter"],
                    "body-md": ["Inter"],
                    "h2": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #27BB97 0%, #1E9E7E 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col items-center justify-center">
<header class="fixed top-0 left-0 w-full h-16 flex items-center px-4 z-50">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
</header>
<main class="w-full max-w-md px-container_margin flex flex-col gap-stack_gap_lg relative">
<div class="absolute -top-24 -left-12 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="absolute -bottom-24 -right-12 w-48 h-48 bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="relative z-10 flex flex-col gap-stack_gap_sm text-center pt-8">
<div class="w-16 h-16 bg-primary-container/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="lock_reset" style="font-variation-settings: 'FILL' 0;">lock_reset</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface">Forgot Password?</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                Enter your registered email or phone to reset
            </p>
</div>
<div class="relative z-10 glass-card p-6 rounded-xl border border-surface-variant/50 shadow-sm flex flex-col gap-stack_gap_md">
<div class="flex flex-col gap-stack_gap_xs">
<label class="font-label-sm text-label-sm text-on-surface" for="identity">Email or Phone</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-[20px]" data-icon="alternate_email">alternate_email</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-outline/50" id="identity" placeholder="your@email.com or +91..." type="text"/>
</div>
</div>
<button class="primary-gradient w-full h-12 rounded-lg font-h3 text-on-primary flex items-center justify-center gap-2 active:scale-[0.98] transition-transform shadow-md shadow-primary/20">
<span>Send Code</span>
<span class="material-symbols-outlined text-[20px]" data-icon="send">send</span>
</button>
</div>
<div class="relative z-10 flex flex-col items-center gap-stack_gap_md">
<div class="w-full flex items-center gap-stack_gap_sm">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-label-sm text-outline font-medium">OR</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<a class="group flex items-center gap-2 py-2" href="#">
<span class="text-body-md text-on-surface-variant">Back to</span>
<span class="text-body-md font-semibold text-primary group-hover:underline">Login</span>
</a>
</div>
</main>
<div class="fixed bottom-8 w-full px-container_margin max-w-md hidden md:block">
<div class="flex justify-center items-center gap-stack_gap_lg">
<div class="flex items-center gap-1.5 opacity-40">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-bold tracking-widest uppercase">Secure Marketplace</span>
</div>
</div>
</div>
</body></html>
