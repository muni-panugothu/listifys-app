<body class="bg-background min-h-screen flex flex-col items-center">
<!-- TopAppBar -->
<header class="flex justify-between items-center px-4 h-16 w-full fixed top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md z-50 border-b border-slate-100 dark:border-slate-800 shadow-sm dark:shadow-none">

</div>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors rounded-full active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-slate-500 dark:text-slate-400" data-icon="notifications">notifications</span>

</div>
</header>

<!-- Background Decorative Elements -->
<div class="absolute inset-0 bg-primary-container/10 rounded-full blur-3xl"></div>
<!-- Folder Illustration using UI Elements -->
<div class="relative z-10 w-48 h-40 bg-surface-container rounded-xl shadow-lg border border-outline-variant/30 flex flex-col overflow-hidden">
<div class="w-20 h-4 bg-surface-container-highest rounded-t-lg absolute -top-4 left-4"></div>
<div class="p-4 flex flex-col gap-3">
<div class="w-full h-2 bg-primary-container/20 rounded-full"></div>
<div class="w-3/4 h-2 bg-primary-container/20 rounded-full"></div>
<div class="w-1/2 h-2 bg-primary-container/20 rounded-full"></div>
</div>
<!-- Glassmorphism accent on the folder -->
<div class="absolute bottom-4 right-4 w-12 h-12 rounded-full bg-primary-container/80 backdrop-blur-sm flex items-center justify-center shadow-md">
<span class="material-symbols-outlined text-white text-2xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Messaging -->
<div class="flex flex-col gap-stack_gap_md mb-stack_gap_lg">
<h1 class="font-h1 text-h1 text-on-surface">Saved to Drafts</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-xs mx-auto">
                You can finish this listing anytime from your profile.
            </p>
</div>
<!-- Action Area -->
<div class="w-full flex flex-col gap-stack_gap_md">
<button class="w-full h-[48px] bg-gradient-to-r from-[#27BB97] to-[#1E9E7E] text-white rounded-lg font-semibold shadow-md active:scale-[0.98] transition-transform">
                Continue Browsing
            </button>
<button class="w-full h-[48px] bg-white border border-slate-100 text-on-surface rounded-lg font-medium hover:bg-slate-50 active:scale-[0.98] transition-transform">
                View My Drafts
            </button>
</div>
<!-- Featured / Preview Section (Asymmetric Layout) -->
<div class="mt-16 w-full text-left">
<h3 class="font-h3 text-h3 text-on-surface mb-stack_gap_md">Related Drafts</h3>
<div class="grid grid-cols-2 gap-grid_gutter">
<div class="bg-white rounded-xl p-3 border border-slate-100 shadow-sm">
<div class="w-full aspect-square bg-surface-container rounded-lg mb-2 overflow-hidden">

<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-sans text-[11px] font-medium tracking-wide">Home</span>
