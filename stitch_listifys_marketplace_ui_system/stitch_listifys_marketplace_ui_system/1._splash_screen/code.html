<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-subtle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.98); }
        }
        .animate-brand {
            animation: pulse-subtle 3s ease-in-out infinite;
        }
        .gradient-mesh {
            background: radial-gradient(circle at 20% 30%, #27BB97 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, #1E9E7E 0%, transparent 50%),
                        linear-gradient(135deg, #27BB97 0%, #1E9E7E 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative flex-1 flex flex-col items-center justify-center min-h-screen w-full gradient-mesh">
<!-- Abstract Glassmorphism Background Decoration -->
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-white/10 rounded-full blur-[80px]"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[40%] h-[40%] bg-white/5 rounded-full blur-[60px]"></div>
<!-- Center Identity Branding -->
<div class="relative z-10 flex flex-col items-center animate-brand">
<!-- Brand Icon Container -->
<div class="w-24 h-24 bg-white/20 backdrop-blur-md rounded-[24px] flex items-center justify-center shadow-2xl border border-white/30 mb-stack_gap_md">
<span class="material-symbols-outlined text-white text-[48px]" data-icon="storefront">storefront</span>
</div>
<!-- Brand Typography -->
<h1 class="font-h1 text-[42px] leading-tight text-white tracking-tighter drop-shadow-sm">
                Listify
            </h1>
<p class="font-label-sm text-white/80 tracking-widest mt-2">
                MARKETPLACE
            </p>
</div>
<!-- Bottom Loading/Status Area -->
<div class="absolute bottom-16 flex flex-col items-center space-y-stack_gap_md">
<!-- Custom Styled Spinner -->
<div class="relative w-10 h-10">
<div class="absolute inset-0 rounded-full border-2 border-white/20"></div>
<div class="absolute inset-0 rounded-full border-t-2 border-white animate-spin"></div>
</div>
<p class="font-label-sm text-white/70 tracking-widest uppercase">
                Loading...
            </p>
</div>
<!-- Aesthetic Footer Elements (Non-functional for Splash) -->
<div class="absolute bottom-8 w-full flex justify-center opacity-30">
<div class="h-1 w-32 bg-white rounded-full"></div>
</div>
</main>
