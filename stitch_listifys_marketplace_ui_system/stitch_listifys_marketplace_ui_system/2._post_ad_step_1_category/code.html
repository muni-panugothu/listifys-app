        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }

            background-color: #f4fbf6;

    body {
      min-height: max(884px, 100dvh);

<body class="font-body-md text-on-surface">
<!-- Top Navigation Header -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 flex justify-between items-center px-4 h-16">
<div class="flex items-center gap-4">
<button class="active:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-h3 text-h3 text-on-surface">Step 1 of 3</h1>
</div>
<button class="font-label-sm text-label-sm text-primary-container font-semibold active:opacity-70 transition-opacity">
            Save as Draft
        </button>
</header>
<main class="pt-20 pb-28 px-4 max-w-2xl mx-auto">
<!-- Search and Instruction -->
<div class="mb-8">
<h2 class="font-h1 text-h1 text-on-surface mb-2">Choose category</h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-6">Select a category that best describes what you are selling.</p>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
<input class="w-full h-12 pl-12 pr-4 rounded-lg border border-slate-200 bg-white focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all font-body-md text-body-md" placeholder="Search categories (e.g. iPhone, Sofa)" type="text"/>
</div>
</div>
<!-- Category Grid (Bento Style) -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-8">
<!-- Selected State Item -->
<button class="flex items-center p-4 bg-white border-2 border-primary-container rounded-xl shadow-sm text-left group">
<div class="w-12 h-12 rounded-lg bg-primary-container/10 flex items-center justify-center mr-4 text-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">devices</span>
</div>
<div class="flex-1">
<span class="block font-h3 text-h3 text-on-surface">Electronics</span>
<span class="block font-label-sm text-label-sm text-primary-container">Selected</span>
</div>
<span class="material-symbols-outlined text-primary-container">check_circle</span>
</button>
<button class="flex items-center p-4 bg-white border border-slate-100 rounded-xl hover:shadow-md transition-shadow text-left group">
<div class="w-12 h-12 rounded-lg bg-surface-container-low flex items-center justify-center mr-4 text-on-surface-variant group-hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined">directions_car</span>
</div>
<div class="flex-1">
<span class="block font-h3 text-h3 text-on-surface">Vehicles</span>
</div>
</button>
<button class="flex items-center p-4 bg-white border border-slate-100 rounded-xl hover:shadow-md transition-shadow text-left group">
<div class="w-12 h-12 rounded-lg bg-surface-container-low flex items-center justify-center mr-4 text-on-surface-variant group-hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined">home</span>
</div>
<div class="flex-1">
<span class="block font-h3 text-h3 text-on-surface">Property</span>
</div>
</button>
<button class="flex items-center p-4 bg-white border border-slate-100 rounded-xl hover:shadow-md transition-shadow text-left group">
<div class="w-12 h-12 rounded-lg bg-surface-container-low flex items-center justify-center mr-4 text-on-surface-variant group-hover:bg-primary-container/5 transition-colors">
<span class="material-symbols-outlined">chair</span>
</div>
<div class="flex-1">
<span class="block font-h3 text-h3 text-on-surface">Furniture</span>
</div>
</button>
</div>
<!-- Subcategories List -->
<div class="bg-white rounded-2xl p-2 border border-slate-100 shadow-sm overflow-hidden">
<div class="px-4 py-3 border-b border-slate-50">
<h3 class="font-label-sm text-label-sm text-outline uppercase tracking-wider">Subcategories in Electronics</h3>
</div>
<div class="divide-y divide-slate-50">
<label class="flex items-center px-4 py-4 hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center mr-4 group-hover:bg-white">
<span class="material-symbols-outlined text-on-surface-variant">laptop_mac</span>
</div>
<span class="flex-1 font-body-lg text-body-lg text-on-surface">Laptops &amp; Computers</span>
<input checked="" class="w-5 h-5 text-primary-container border-slate-300 focus:ring-primary-container" name="subcategory" type="radio"/>
</label>
<label class="flex items-center px-4 py-4 hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center mr-4 group-hover:bg-white">
<span class="material-symbols-outlined text-on-surface-variant">smartphone</span>
</div>
<span class="flex-1 font-body-lg text-body-lg text-on-surface">Mobile Phones</span>
<input class="w-5 h-5 text-primary-container border-slate-300 focus:ring-primary-container" name="subcategory" type="radio"/>
</label>
<label class="flex items-center px-4 py-4 hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center mr-4 group-hover:bg-white">
<span class="material-symbols-outlined text-on-surface-variant">camera</span>
</div>
<span class="flex-1 font-body-lg text-body-lg text-on-surface">Cameras &amp; Photography</span>
<input class="w-5 h-5 text-primary-container border-slate-300 focus:ring-primary-container" name="subcategory" type="radio"/>
</label>
<label class="flex items-center px-4 py-4 hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center mr-4 group-hover:bg-white">
<span class="material-symbols-outlined text-on-surface-variant">headphones</span>
</div>
<span class="flex-1 font-body-lg text-body-lg text-on-surface">Audio &amp; Accessories</span>
<input class="w-5 h-5 text-primary-container border-slate-300 focus:ring-primary-container" name="subcategory" type="radio"/>
</label>
<label class="flex items-center px-4 py-4 hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center mr-4 group-hover:bg-white">
<span class="material-symbols-outlined text-on-surface-variant">tv</span>
</div>
<span class="flex-1 font-body-lg text-body-lg text-on-surface">TV &amp; Video Equipment</span>
<input class="w-5 h-5 text-primary-container border-slate-300 focus:ring-primary-container" name="subcategory" type="radio"/>
</label>
</div>
</div>
<!-- Featured Listing Suggestion (Visual Extra) -->
<div class="mt-8 relative rounded-2xl overflow-hidden h-40 group cursor-pointer">
<img alt="Premium tech workspace" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" data-alt="Modern workspace with high-end laptop, sleek keyboard, and minimalist desk accessories under clean bright studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqm29wPN47CqCaKKRW4RaY6lmrRz-UsgdBsk160WYD1oUifwnwMfpUf-l7_mgN_ZWSZfpvIzQAj3UxOQ9bH5GIplKBHlapSr_FQUDjag4shYNt9B_ta4fUyPh826ohA333SKCyzn-Wxbq-UL-gCFj3paZfwkFPSibvj_uYvH9fTcOXZpg7l_tS9QczWTfsYPLvnLNGZoxqpVa-Qta8VUrPAx6Lj5qYvnkYQmYCAUNIMYUHoymdweQKimVLE-0uOJ2cWKsBqWFNLO8"/>
<div class="absolute inset-0 bg-gradient-to-r from-on-primary-container/80 to-transparent flex flex-col justify-center px-6">
<span class="text-white font-label-sm text-label-sm mb-1 opacity-80">Selling Business Assets?</span>
<h4 class="text-white font-h2 text-h2 mb-2">List in Enterprise Category</h4>
<button class="w-fit px-4 py-1.5 bg-white/20 backdrop-blur-md border border-white/30 rounded-full text-white font-label-sm text-label-sm">Explore Pro Tools</button>
</div>
</div>
</main>
<!-- Fixed Footer Action -->
<footer class="fixed bottom-0 left-0 w-full z-50 p-4 bg-white border-t border-slate-100 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]">
<div class="max-w-2xl mx-auto flex items-center gap-4">
<div class="flex-1">
<p class="font-label-sm text-label-sm text-on-surface-variant">Selected: <span class="font-bold text-on-surface">Laptops &amp; Computers</span></p>
</div>
<button class="h-12 px-10 bg-gradient-to-r from-[#27BB97] to-[#1E9E7E] text-white font-bold rounded-lg shadow-lg active:scale-95 transition-transform">
                Next
            </button>
</div>
</footer>
</body></html>
