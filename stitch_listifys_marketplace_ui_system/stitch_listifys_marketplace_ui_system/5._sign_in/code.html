<!DOCTYPE html>

<html class="light" lang="en"><head>

                    "inverse-surface": "#2b322f",
                    "on-tertiary-fixed": "#241a00",
                    "surface-container-highest": "#dde4df",
                    "on-surface-variant": "#3c4a44",
                    "surface-container-high": "#e3eae5",
                    "surface": "#f4fbf6",
                    "inverse-on-surface": "#ecf2ed",
                    "primary": "#006b55",

                    "stack_gap_lg": "24px"
            },
            "fontFamily": {
                    "h3": ["Inter"],
                    "price-lg": ["Inter"],
                    "body-lg": ["Inter"],

                    "h1": ["Inter"],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #27BB97 0%, #1E9E7E 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen flex flex-col">
<!-- Top Navigation -->
<header class="bg-white/80 backdrop-blur-md text-slate-900 shadow-sm flex justify-between items-center px-4 h-16 w-full fixed top-0 z-50 border-b border-slate-100">
<div class="flex items-center active:opacity-70 transition-opacity cursor-pointer">
<span class="material-symbols-outlined text-slate-900" data-icon="arrow_back">arrow_back</span>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<h1 class="text-xl font-black text-[#27BB97] tracking-tight font-h2">Listify</h1>
</div>
<div class="w-6"></div> <!-- Spacer for symmetry -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 mt-16 px-container_margin flex flex-col justify-center max-w-md mx-auto w-full pb-10">
<!-- Welcome Section -->
<div class="mb-stack_gap_lg">
<h1 class="font-h1 text-h1 text-on-background mb-2">Welcome Back</h1>
<p class="font-body-lg text-body-lg text-outline">Enter your details to continue</p>
</div>
<!-- Form Section -->
<form class="space-y-stack_gap_md" onsubmit="return false;">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-background font-medium">Email or Phone</label>
<div class="relative group">
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg px-4 focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all font-body-md" placeholder="email@example.com" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-background font-medium">Password</label>
<div class="relative group">
<input class="w-full h-12 bg-surface-container-lowest border border-outline-variant rounded-lg px-4 pr-12 focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all font-body-md" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="font-label-sm text-label-sm text-primary font-semibold hover:opacity-80 transition-opacity" href="#">Forgot Password?</a>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full h-[48px] bg-primary-gradient text-white rounded-lg font-h3 text-h3 flex items-center justify-center active:scale-95 transition-transform shadow-md" type="submit">
                Sign In
            </button>
</form>
<!-- Divider -->
<div class="relative my-stack_gap_lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-label-sm">
<span class="bg-background px-4 text-outline font-body-md">Or continue with</span>
</div>
</div>
<!-- Social Auth Buttons -->
<div class="grid grid-cols-2 gap-stack_gap_md mb-stack_gap_lg">
<button class="flex items-center justify-center gap-2 h-12 bg-white border border-outline-variant rounded-lg hover:bg-surface-container transition-colors active:scale-95">
<img alt="" class="w-5 h-5" data-alt="Google logo with vibrant colorful G symbol on white circular background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgV_u0bTzKiR0QixoJnagmUVKOVYQQ3ISLHADKzKWhYxKOKjam943lxf1WOJ1OXhKvlFj4xmgMWoC6QEA9HMGfUEtqg1luIePisONFVKLTv3u0Jd5_VJnqsng3VBWTnEEeMYslDrmL_HTXTnpz2fV-jLOXX0ouTEed1MSjGJjt9QJdd049CZm5QzeZhr9Q4XHVHmsCq_rFnZyLlBuEXorjR1h2ai9CaBA6WfpkydAW_o6gMZoxL2VI2k0MwWLlukwasCO0jcQKSu8"/>
<span class="font-body-md font-medium">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-12 bg-white border border-outline-variant rounded-lg hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-slate-900" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span class="font-body-md font-medium">Apple</span>
</button>
</div>
<!-- Sticky Bottom Image Decor -->
<div class="mt-auto pt-8">
<div class="rounded-2xl overflow-hidden h-32 relative group">
<div class="absolute inset-0 bg-gradient-to-t from-primary/20 to-transparent z-10"></div>
<img alt="Modern Marketplace" class="w-full h-full object-cover" data-alt="abstract architectural shot of a modern clean retail space with soft green and white tones and professional lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvituXiz2F3S1OCXbF1NxOQlaSk4Iqelt3Ef3NAlfek1G07G63fr6CyqgrT_Q_plYS1lwYrbkHAZZ1oOGPmIBQGZk2fLGNPf-QCI6Aa89Otmy8FdEASGBEuchX5GGo8QBtl_-ziiUBtq0Ah7v1UC-_FtwzCayOT-Tgh3puEm_OFaPq2mON4wSX01KzQVJ1AG4o8SGqfpYQs8hVWSAeD-SI2ZtxPzMtoCCWolm-K11pCh3oQQIy63RG9S51RCBWhpTVsUdoj1miv6I"/>
<div class="absolute inset-0 flex items-center justify-center z-20">
<p class="font-label-sm text-white bg-black/30 backdrop-blur-md px-3 py-1 rounded-full border border-white/20">The most trusted local marketplace</p>
</div>
</div>
</div>
<!-- Sign Up Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-outline">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline transition-all" href="#">Sign Up</a>
</p>
</div>
</main>
<!-- Suppressed Nav Shell as per Destination Rule (Transactional Page) -->
</body></html>
