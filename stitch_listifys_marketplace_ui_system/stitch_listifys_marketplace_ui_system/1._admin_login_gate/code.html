<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Portal - Secure Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#55dcb6",
                        "on-tertiary-fixed-variant": "#584400",
                        "tertiary": "#755b00",
                        "secondary-fixed": "#d5e3ff",
                        "primary-fixed": "#75f9d2",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#006b55",
                        "tertiary-container": "#cba100",
                        "surface": "#f4fbf6",
                        "on-tertiary": "#ffffff",
                        "on-background": "#161d1a",
                        "tertiary-fixed": "#ffe08e",
                        "primary-fixed-dim": "#55dcb6",
                        "primary": "#006b55",
                        "outline-variant": "#bbcac3",
                        "on-surface-variant": "#3c4a44",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-container-low": "#eff5f0",
                        "surface-container-high": "#e3eae5",
                        "on-primary-container": "#004535",
                        "surface-container-highest": "#dde4df",
                        "on-primary-fixed-variant": "#00513f",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#00376b",
                        "secondary-container": "#5ba2ff",
                        "on-surface": "#161d1a",
                        "on-tertiary-container": "#4b3a00",
                        "tertiary-fixed-dim": "#f0c122",
                        "inverse-on-surface": "#ecf2ed",
                        "inverse-surface": "#2b322f",
                        "on-secondary-fixed-variant": "#004786",
                        "outline": "#6c7a74",
                        "on-primary-fixed": "#002118",
                        "on-secondary-fixed": "#001c3b",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "secondary": "#005fb0",
                        "secondary-fixed-dim": "#a6c8ff",
                        "on-tertiary-fixed": "#241a00",
                        "surface-bright": "#f4fbf6",
                        "surface-container": "#e9efeb",
                        "primary-container": "#27bb97",
                        "background": "#f4fbf6",
                        "error-container": "#ffdad6",
                        "surface-variant": "#dde4df",
                        "surface-dim": "#d5dcd7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack_gap_xs": "4px",
                        "stack_gap_sm": "8px",
                        "grid_gutter": "12px",
                        "container_margin": "16px",
                        "stack_gap_md": "16px",
                        "stack_gap_lg": "24px"
                    },
                    "fontFamily": {
                        "price-lg": ["Inter"],
                        "h3": ["Inter"],
                        "h2": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "h1": ["Inter"],
                        "label-sm": ["Inter"],
                        "price-md": ["Inter"]
                    },
                    "fontSize": {
                        "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                        "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}],
                        "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .auth-bg {
            background: radial-gradient(circle at top right, #e3eae5 0%, #f4fbf6 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background font-body-md text-on-background min-h-screen flex items-center justify-center p-container_margin auth-bg">
<main class="w-full max-w-[440px] flex flex-col gap-stack_gap_lg">
<!-- Brand Identity Section -->
<div class="flex flex-col items-center text-center gap-stack_gap_sm">
<div class="w-16 h-16 rounded-xl bg-primary flex items-center justify-center shadow-lg shadow-primary/20 mb-stack_gap_sm">
<span class="material-symbols-outlined text-white text-4xl" data-icon="shield_lock">shield_lock</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface tracking-tight">Admin Dashboard</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Admin Portal</p>
</div>
<!-- Login Card -->
<div class="glass-panel p-8 rounded-xl shadow-xl space-y-stack_gap_lg border border-outline-variant/30">
<form class="space-y-stack_gap_md">
<!-- Email Field -->
<div class="space-y-stack_gap_xs">
<label class="block font-label-sm text-label-sm text-on-surface ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="alternate_email">alternate_email</span>
</div>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-lowest border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md" placeholder="admin@marketplace.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-stack_gap_xs">
<label class="block font-label-sm text-label-sm text-on-surface ml-1">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full h-12 pl-12 pr-12 bg-surface-container-lowest border border-outline-variant rounded-lg focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-md" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Secondary Controls -->
<div class="flex items-center justify-between pt-stack_gap_xs">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer hidden" type="checkbox"/>
<div class="w-5 h-5 border-2 border-outline-variant rounded peer-checked:bg-primary peer-checked:border-primary transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[14px] opacity-0 peer-checked:opacity-100" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<span class="font-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember this device</span>
</label>
</div>
<!-- Action Button -->
<button class="w-full h-12 bg-gradient-to-r from-primary-container to-primary text-white font-h3 text-h3 rounded-lg shadow-md shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 mt-4" type="submit">
<span class="material-symbols-outlined text-[20px]" data-icon="verified_user">verified_user</span>
                    Secure Login
                </button>
</form>
<!-- Footer Links -->
<div class="flex flex-col items-center gap-stack_gap_sm pt-stack_gap_md border-t border-outline-variant/30">
<a class="font-label-sm text-label-sm text-secondary hover:text-on-secondary-container transition-colors flex items-center gap-1" href="#">
                    Forgot Admin Password?
                </a>
</div>
</div>
<!-- Security Disclaimer -->
<div class="flex items-center justify-center gap-4 text-outline">
<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-surface-container-high/50 border border-outline-variant/20">
<span class="material-symbols-outlined text-[16px]" data-icon="encrypted">encrypted</span>
<span class="font-label-sm text-[11px] uppercase tracking-wider font-semibold">AES-256 Encrypted</span>
</div>
<div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-surface-container-high/50 border border-outline-variant/20">
<span class="material-symbols-outlined text-[16px]" data-icon="gpp_good">gpp_good</span>
<span class="font-label-sm text-[11px] uppercase tracking-wider font-semibold">ISO 27001 Certified</span>
</div>
</div>
</main>
<!-- Footer Identity (Discrete) -->
<footer class="fixed bottom-8 w-full text-center md:px-0 px-container_margin">
<p class="font-label-sm text-on-surface-variant opacity-60">
            © 2024 Multi-Category Marketplace Management. All Rights Reserved.
        </p>
</footer>
<!-- Background Decorative Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] rounded-full bg-secondary/5 blur-[100px]"></div>
</div>
</body></html>
