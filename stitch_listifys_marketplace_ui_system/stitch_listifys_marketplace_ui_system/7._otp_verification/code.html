<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline-variant": "#bbcac3",
                    "inverse-primary": "#55dcb6",
                    "surface-dim": "#d5dcd7",
                    "on-tertiary": "#ffffff",
                    "surface-variant": "#dde4df",
                    "on-primary": "#ffffff",
                    "primary-fixed": "#75f9d2",
                    "on-background": "#161d1a",
                    "secondary-fixed-dim": "#a6c8ff",
                    "error": "#ba1a1a",
                    "primary-container": "#27bb97",
                    "surface-container": "#e9efeb",
                    "surface-tint": "#006b55",
                    "secondary": "#005fb0",
                    "on-tertiary-container": "#4b3a00",
                    "on-error": "#ffffff",
                    "inverse-surface": "#2b322f",
                    "on-tertiary-fixed": "#241a00",
                    "surface-container-highest": "#dde4df",
                    "on-surface-variant": "#3c4a44",
                    "surface-container-high": "#e3eae5",
                    "surface": "#f4fbf6",
                    "inverse-on-surface": "#ecf2ed",
                    "primary": "#006b55",
                    "on-primary-container": "#004535",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#ffe08e",
                    "surface-container-low": "#eff5f0",
                    "tertiary-container": "#cba100",
                    "on-error-container": "#93000a",
                    "on-primary-fixed-variant": "#00513f",
                    "secondary-fixed": "#d5e3ff",
                    "tertiary": "#755b00",
                    "background": "#f4fbf6",
                    "surface-bright": "#f4fbf6",
                    "error-container": "#ffdad6",
                    "on-surface": "#161d1a",
                    "on-secondary-fixed-variant": "#004786",
                    "secondary-container": "#5ba2ff",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#f0c122",
                    "primary-fixed-dim": "#55dcb6",
                    "on-secondary-container": "#00376b",
                    "outline": "#6c7a74",
                    "on-secondary-fixed": "#001c3b",
                    "on-primary-fixed": "#002118",
                    "on-tertiary-fixed-variant": "#584400"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "grid_gutter": "12px",
                    "container_margin": "16px",
                    "stack_gap_sm": "8px",
                    "stack_gap_md": "16px",
                    "stack_gap_xs": "4px",
                    "stack_gap_lg": "24px"
            },
            "fontFamily": {
                    "h3": ["Inter"],
                    "price-lg": ["Inter"],
                    "body-lg": ["Inter"],
                    "price-md": ["Inter"],
                    "h1": ["Inter"],
                    "body-md": ["Inter"],
                    "h2": ["Inter"],
                    "label-sm": ["Inter"]
            },
            "fontSize": {
                    "h3": ["18px", {"lineHeight": "24px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "price-lg": ["20px", {"lineHeight": "24px", "fontWeight": "700"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "price-md": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "h2": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .otp-input:focus {
            border-color: #27BB97;
            box-shadow: 0 0 0 2px rgba(39, 187, 151, 0.1);
            outline: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-on-background antialiased">
<!-- Top AppBar (Generated from JSON guidance) -->
<header class="flex justify-between items-center px-4 h-16 w-full fixed top-0 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-100 dark:border-slate-800 shadow-sm z-50">
<button class="active:opacity-70 transition-opacity p-2 -ml-2 text-slate-900 dark:text-slate-50">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<span class="text-xl font-black text-[#27BB97] tracking-tight">Listify</span>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-center px-container_margin pt-24 pb-12 w-full max-w-md mx-auto">
<!-- Illustration/Icon Section -->
<div class="mb-stack_gap_lg relative">
<div class="absolute inset-0 bg-primary-container/10 rounded-full blur-2xl transform scale-150"></div>
<div class="relative w-24 h-24 bg-surface-container-lowest rounded-full flex items-center justify-center shadow-sm border border-slate-100">
<span class="material-symbols-outlined text-[48px] text-primary-container" data-icon="shield">shield</span>
</div>
</div>
<!-- Header Text -->
<div class="text-center mb-stack_gap_lg">
<h1 class="font-h1 text-h1 text-on-background mb-2">Verification Code</h1>
<p class="font-body-md text-body-md text-outline">Enter the 4-digit code sent to <span class="font-semibold text-on-background">+91 98765-XXXXX</span></p>
</div>
<!-- OTP Input Group -->
<div class="flex gap-grid_gutter mb-stack_gap_md w-full justify-center">
<input class="w-16 h-20 text-center text-price-lg font-price-lg bg-white border border-slate-200 rounded-xl otp-input transition-all duration-200 focus:scale-105" maxlength="1" placeholder="•" type="text"/>
<input class="w-16 h-20 text-center text-price-lg font-price-lg bg-white border border-slate-200 rounded-xl otp-input transition-all duration-200 focus:scale-105" maxlength="1" placeholder="•" type="text"/>
<input class="w-16 h-20 text-center text-price-lg font-price-lg bg-white border border-slate-200 rounded-xl otp-input transition-all duration-200 focus:scale-105" maxlength="1" placeholder="•" type="text"/>
<input class="w-16 h-20 text-center text-price-lg font-price-lg bg-white border border-slate-200 rounded-xl otp-input transition-all duration-200 focus:scale-105" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Timer -->
<div class="flex items-center gap-stack_gap_xs text-outline mb-stack_gap_lg">
<span class="material-symbols-outlined text-[18px]">schedule</span>
<span class="font-label-sm text-label-sm">00:59</span>
</div>
<!-- Action Button -->
<button class="w-full h-[48px] rounded-xl bg-gradient-to-r from-[#27BB97] to-[#1E9E7E] text-white font-semibold text-body-lg shadow-lg shadow-primary-container/20 active:scale-[0.98] transition-transform opacity-50 cursor-not-allowed">
            Verify
        </button>
<!-- Footer Resend Link -->
<div class="mt-stack_gap_lg text-center">
<p class="font-body-md text-body-md text-outline">
                Didn't receive code? 
                <button class="text-primary-container font-semibold hover:underline active:opacity-70 ml-1">Resend</button>
</p>
</div>
</main>
<!-- Decoration / Aesthetic Accent (Asymmetric Glass Circle) -->
<div class="fixed -bottom-24 -left-24 w-64 h-64 bg-primary-container/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed -top-12 -right-12 w-48 h-48 bg-secondary-container/5 rounded-full blur-3xl pointer-events-none"></div>
<!-- Hidden Nav Shell (Suppressed based on Transactional Rule) -->
<!-- Navigation shell is suppressed for linear transactional screens like OTP verification to prioritize focus -->
</body></html>
